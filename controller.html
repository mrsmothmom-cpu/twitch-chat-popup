<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Streamer Tool - Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alice&display=swap');

        body { font-family: 'Alice', serif; background: #18181b; color: white; margin: 0; padding: 20px; }
        .header { position: sticky; top: 0; background: #18181b; padding-bottom: 15px; z-index: 10; }
        button { 
            width: 100%; padding: 15px; background: #eb0400; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem;
        }
        button:hover { background: #ff2a26; }
        #chat { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .msg { 
            padding: 15px; background: #26262c; border-radius: 6px; cursor: pointer; 
            border-left: 5px solid transparent; transition: all 0.2s ease;
        }
        .msg:hover { background: #323239; border-left-color: #9147ff; }
        .user { font-weight: bold; display: block; margin-bottom: 4px; }
        .text { color: #efeff1; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="dismiss()">DISMISS CURRENT MESSAGE</button>
    </div>
    <div id="chat"></div>

    <script>
        const bc = new BroadcastChannel('twitch_highlight');

        // This function ensures we ALWAYS have a valid CSS color
        function getSafeColor(user, twitchColor) {
            if (twitchColor && twitchColor !== "") return twitchColor;
            
            // Fallback: Generate a consistent color based on the username
            let hash = 0;
            for (let i = 0; i < user.length; i++) {
                hash = user.charCodeAt(i) + ((hash << 5) - hash);
            }
            // Returns a vibrant HSL color
            return `hsl(${Math.abs(hash % 360)}, 70%, 45%)`;
        }

        ComfyJS.onChat = (user, message, flags, self, extra) => {
            const userColor = getSafeColor(user, extra.userColor);
            
            const div = document.createElement("div");
            div.className = "msg";
            div.innerHTML = `
                <span class="user" style="color: ${userColor} !important; text-shadow: 1px 1px 0px rgba(0,0,0,0.1);">${user}:</span> 
                <span class="text">${message}</span>
            `;
            
            div.onclick = () => {
                bc.postMessage({ type: 'SHOW', user, message, color: userColor });
            };
            
            const chatContainer = document.getElementById("chat");
            chatContainer.prepend(div);
            if (chatContainer.children.length > 50) chatContainer.removeChild(chatContainer.lastChild);
        };

        function dismiss() {
            bc.postMessage({ type: 'HIDE' });
        }

        // REPLACE WITH YOUR TWITCH USERNAME
        ComfyJS.Init("MrsMothmom");
    </script>
</body>
</html>
