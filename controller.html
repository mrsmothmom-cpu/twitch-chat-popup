<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Streamer Tool - Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <style>
        /* Neutral Sans Serif for high readability */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #18181b; 
            color: white; 
            margin: 0; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat { 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; /* Keeps messages at the bottom */
            gap: 10px; 
            padding: 20px;
            overflow-y: auto;
        }

        .msg { 
            padding: 12px; 
            background: #26262c; 
            border-radius: 6px; 
            cursor: pointer; 
            border-left: 5px solid transparent; 
            animation: slideUp 0.2s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg:hover { background: #323239; border-left-color: #9147ff; }
        .user { font-weight: bold; display: block; margin-bottom: 2px; }
        
        .footer { 
            padding: 15px; 
            background: #18181b; 
            border-top: 1px solid #333;
        }

        button { 
            width: 100%; padding: 15px; background: #eb0400; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem;
        }
        button:hover { background: #ff2a26; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="footer">
        <button onclick="dismiss()">DISMISS CURRENT MESSAGE</button>
    </div>

    <script>
        const bc = new BroadcastChannel('twitch_highlight');

        function getSafeColor(user, twitchColor) {
            if (twitchColor && twitchColor !== "") return twitchColor;
            let hash = 0;
            for (let i = 0; i < user.length; i++) {
                hash = user.charCodeAt(i) + ((hash << 5) - hash);
            }
            return `hsl(${Math.abs(hash % 360)}, 70%, 45%)`;
        }

        ComfyJS.onChat = (user, message, flags, self, extra) => {
            const userColor = getSafeColor(user, extra.userColor);
            const div = document.createElement("div");
            div.className = "msg";
            div.innerHTML = `<span class="user" style="color: ${userColor}">${user}:</span> ${message}`;
            
            div.onclick = () => {
                bc.postMessage({ type: 'SHOW', user, message, color: userColor });
            };
            
            const chatContainer = document.getElementById("chat");
            chatContainer.appendChild(div); // Add to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight; // Auto-scroll
        };

        function dismiss() {
            bc.postMessage({ type: 'HIDE' });
        }

        ComfyJS.Init("MrsMothmom");
    </script>
</body>
</html>
