<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alice&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Alice', serif; width: 1920px; height: 1080px; }

        #highlight-container {
            position: absolute;
            bottom: 120px;
            left: 50%;
            width: 850px;
            background: #f1f1f1;
            opacity: 0.8;
            border-left: 15px solid #9147ff;
            color: #050510;
            padding: 35px 45px;
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateX(-50%) translateY(200px);
            transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.5s ease;
        }

        #highlight-container.active { opacity: 1; transform: translateX(-50%) translateY(0); }

        #display-user { 
            font-size: 2.3rem; 
            text-transform: uppercase; 
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.4);
        }

        #display-text { font-size: 2.8rem; line-height: 1.3; word-wrap: break-word; }
    </style>
</head>
<body>
    <div id="highlight-container">
        <div id="display-user"></div>
        <div id="display-text"></div>
    </div>

    <script>
        const bc = new BroadcastChannel('twitch_highlight');
        const container = document.getElementById('highlight-container');
        const userEl = document.getElementById('display-user');
        const textEl = document.getElementById('display-text');
        
        let autoDismissTimer;

        bc.onmessage = (ev) => {
            if (ev.data.type === 'SHOW') {
                if (container.classList.contains('active')) {
                    container.classList.remove('active');
                    clearTimeout(autoDismissTimer);
                    setTimeout(() => { updateUI(ev.data); }, 700);
                } else {
                    updateUI(ev.data);
                }
            } else if (ev.data.type === 'HIDE') {
                container.classList.remove('active');
                clearTimeout(autoDismissTimer);
            }
        };

        function updateUI(data) {
            userEl.innerText = data.user;
            textEl.innerText = data.message;
            userEl.style.setProperty('color', data.color, 'important');
            container.style.setProperty('border-left-color', data.color, 'important');
            container.classList.add('active');

            // Automatic dismissal after 40 seconds
            clearTimeout(autoDismissTimer);
            autoDismissTimer = setTimeout(() => {
                container.classList.remove('active');
            }, 40000); 
        }
    </script>
</body>
</html>
