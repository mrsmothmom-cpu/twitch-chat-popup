<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alice&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Alice', serif; width: 1920px; height: 1080px; }

        #highlight-container {
            position: absolute;
            bottom: 120px;
            left: 50%;
            width: 850px;
            background: #f1f1f1;
            border-left: 15px solid #9147ff; /* Fallback color */
            color: #050510;
            padding: 35px 45px;
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            
            /* Animation States */
            opacity: 0;
            transform: translateX(-50%) translateY(200px);
            transition: 
                transform 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55), 
                opacity 0.5s ease;
        }

        #highlight-container.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #display-user {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 10px;
            /* This shadow ensures bright yellows/cyans are readable on #f1f1f1 */
            text-shadow: 2px 2px 2px rgba(0, 0, 0, 0.4);
            /* Optional: Subtle outline for extreme legibility */
            -webkit-text-stroke: 0.5px rgba(0, 0, 0, 0.2);
        }

        #display-text {
            font-size: 2.6rem;
            line-height: 1.2;
            font-weight: 700;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div id="highlight-container">
        <div id="display-user"></div>
        <div id="display-text"></div>
    </div>

    <script>
        const bc = new BroadcastChannel('twitch_highlight');
        const container = document.getElementById('highlight-container');
        const userEl = document.getElementById('display-user');
        const textEl = document.getElementById('display-text');

        bc.onmessage = (ev) => {
            if (ev.data.type === 'SHOW') {
                if (container.classList.contains('active')) {
                    container.classList.remove('active');
                    setTimeout(() => { updateUI(ev.data); }, 700);
                } else {
                    updateUI(ev.data);
                }
            } else if (ev.data.type === 'HIDE') {
                container.classList.remove('active');
            }
        };

        function updateUI(data) {
            const userEl = document.getElementById('display-user');
            const textEl = document.getElementById('display-text');
            const container = document.getElementById('highlight-container');

            userEl.innerText = data.user;
            textEl.innerText = data.message;
            
            // Applying the color
            userEl.style.setProperty('color', data.color, 'important');
            container.style.setProperty('border-left-color', data.color, 'important');
            
            container.classList.add('active');
        }
    </script>
</body>
</html>
